<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="./css/contact.css"/>

    <title>Document</title>
</head>
<body>

   <div class="overall">
    <div class="l">
        <div class="name">
            <h1 class="h1111">Cont</h1>
            <div style="justify-content: center; display: flex";>
            <h1 class="new">contact</h1></div>
        </div>
    </div>




    <div class="r">
        <div class="name1">
            <h1 class="h1-1">act Me</h1>
        </div>


        <div class="form">
            <form>
                <h1>LET'S WORK TOGETHER</h1>
                <input placeholder="YOUR NAME"/>
                <input placeholder="ENTER EMAIL"/>
                <textarea placeholder="Your Message"></textarea>
                <button>Send message</button>
            </form>
        </div>


        <div class="icon">
            <a id="mailLink" href="mailto:km479950@gmail.com" target="_self" rel="noopener noreferrer"><i class="fa-solid fa-arrow-up"></i></a>
        </div>
        <script>
            (function () {
                var form = document.querySelector('.form form');
                var nameInput = form ? form.querySelector('input[placeholder="YOUR NAME"]') : null;
                var emailInput = form ? form.querySelector('input[placeholder="ENTER EMAIL"]') : null;
                var messageTextarea = form ? form.querySelector('textarea') : null;
                var mailLink = document.getElementById('mailLink');
                if (!form || !nameInput || !emailInput || !messageTextarea || !mailLink) return;

                function buildMailto() {
                    var yourName = (nameInput.value || '').trim();
                    var userEmail = (emailInput.value || '').trim();
                    var userMessage = (messageTextarea.value || '').trim();

                    var subject = 'Contact from portfolio';
                    var body =
                        'YOUR NAME: ' + yourName + '\n' +
                        'ENTER EMAIL: ' + userEmail + '\n\n' +
                        'Your Message: ' + userMessage;

                    var url = 'mailto:km479950@gmail.com' +
                        '?subject=' + encodeURIComponent(subject) +
                        '&body=' + encodeURIComponent(body);

                    return url;
                }

                // Send button should open mail with current inputs.
                form.addEventListener('submit', function (e) {
                    e.preventDefault();
                    window.location.href = buildMailto();
                });
            })();
        </script>
    </div>


    <div class="img">
        <img src="https://i.pinimg.com/736x/14/6a/08/146a085953504b91adf9b8f7dd90b804.jpg"/>
        

    </div>
   </div>
    
</body>
</html>
